<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { FontLoader }    from 'three/addons/loaders/FontLoader.js';
import { TextGeometry }  from 'three/addons/geometries/TextGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }    from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);
scene.fog = new THREE.FogExp2(0x000008, 0.032);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 130);
camera.position.set(0, 0, 7);
camera.layers.enable(2); // also see box layer

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.8;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Environment map for metallic reflections
const pmremGen = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGen.fromScene(new RoomEnvironment(), 0.04).texture;
pmremGen.dispose();

// ── Bloom ─────────────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 1.6, 0.55, 0.80
);
composer.addPass(bloom);

// ── Ambient ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x050510));

// ── Strobe lights ─────────────────────────────────────────────────────────────
const LIGHT_DEFS = [
  { hex: 0xff0055, speed: 1.40, radius: 4.5, yAmp: 1.2, yOff:  0.4, zA: 2.5, strobeHz: 2.80 },
  { hex: 0x0099ff, speed: 0.80, radius: 3.5, yAmp: 1.5, yOff: -0.6, zA: 3.0, strobeHz: 3.35 },
  { hex: 0xff7700, speed: 1.90, radius: 5.0, yAmp: 0.8, yOff:  0.9, zA: 1.8, strobeHz: 2.10 },
  { hex: 0x00ffbb, speed: 1.10, radius: 3.0, yAmp: 1.8, yOff: -0.9, zA: 2.0, strobeHz: 4.10 },
  { hex: 0xff00ff, speed: 2.30, radius: 2.5, yAmp: 2.0, yOff:  0.0, zA: 4.0, strobeHz: 5.25 },
  { hex: 0xffee00, speed: 0.60, radius: 5.5, yAmp: 0.6, yOff:  0.6, zA: 1.5, strobeHz: 1.75 },
];

const lights = LIGHT_DEFS.map(d => {
  const pl = new THREE.PointLight(d.hex, 0, 22);
  pl.layers.disable(2); // strobes don't illuminate the logo faces
  scene.add(pl);
  return { pl, ...d, phase: Math.random() * Math.PI * 2 };
});

// Soft white light dedicated to the logo boxes (layer 2 only)
const logoLight = new THREE.PointLight(0xffffff, 0.9, 18);
logoLight.layers.set(2);
logoLight.position.set(0, -1.0, 6);
scene.add(logoLight);

// ── Cloud particle tunnel ─────────────────────────────────────────────────────
const N  = 3200;
const pP = new Float32Array(N * 3);
const pS = new Float32Array(N);

function spawnCloud(i, spread) {
  const ang = Math.random() * Math.PI * 2;
  const r   = 2.4 + Math.random() * 4.8;
  pP[i*3  ] = Math.cos(ang) * r;
  pP[i*3+1] = Math.sin(ang) * r;
  pP[i*3+2] = spread ? -(Math.random() * 68) : -(62 + Math.random() * 10);
  pS[i]     = 3.5 + Math.random() * 7.0;
}
for (let i = 0; i < N; i++) spawnCloud(i, true);

const cloudGeo = new THREE.BufferGeometry();
cloudGeo.setAttribute('position', new THREE.BufferAttribute(pP, 3));
cloudGeo.setAttribute('aSize',    new THREE.BufferAttribute(pS, 1));

const NL = LIGHT_DEFS.length; // 6

const cloudVert = /* glsl */`
attribute float aSize;
varying vec3  vWorld;
varying float vFade;

void main() {
  vec4 wPos  = modelMatrix * vec4(position, 1.0);
  vWorld     = wPos.xyz;
  vec4 mvPos = viewMatrix * wPos;
  float d    = -mvPos.z;
  vFade      = smoothstep(1.5, 6.0, d);
  float ps   = aSize * (430.0 / max(d, 0.1));
  gl_PointSize = clamp(ps, 1.0, 220.0);
  gl_Position  = projectionMatrix * mvPos;
}
`;

const cloudFrag = /* glsl */`
#define NL ${NL}
uniform vec3  uLP[NL];
uniform vec3  uLC[NL];
uniform float uLI[NL];

varying vec3  vWorld;
varying float vFade;

void main() {
  vec2  uv   = gl_PointCoord - 0.5;
  float r    = length(uv) * 2.0;
  if (r > 1.0) discard;

  // Soft wispy cloud shape — layered falloff
  float core  = exp(-r * r * 3.5);
  float haze  = (1.0 - smoothstep(0.0, 1.0, r)) * 0.5;
  float shape = core * 0.65 + haze * 0.35;

  // Accumulate light contributions
  vec3 col = vec3(0.003, 0.003, 0.010);
  for (int i = 0; i < NL; i++) {
    float d   = length(uLP[i] - vWorld);
    float att = uLI[i] / (1.0 + 0.22 * d + 0.030 * d * d);
    col      += uLC[i] * att;
  }

  gl_FragColor = vec4(col, shape * 0.40 * vFade);
}
`;

const cloudMat = new THREE.ShaderMaterial({
  vertexShader:   cloudVert,
  fragmentShader: cloudFrag,
  uniforms: {
    uLP: { value: lights.map(() => new THREE.Vector3()) },
    uLC: { value: lights.map(l => new THREE.Color(l.hex)) },
    uLI: { value: new Float32Array(NL) },
  },
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});

scene.add(new THREE.Points(cloudGeo, cloudMat));

// ── Text ──────────────────────────────────────────────────────────────────────
const textGroup = new THREE.Group();
scene.add(textGroup);

new FontLoader().load(
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
  font => {
    const geo = new TextGeometry('BASS KITTENS', {
      font,
      size:           0.75,
      height:         0.22,
      curveSegments:  16,
      bevelEnabled:   true,
      bevelThickness: 0.04,
      bevelSize:      0.026,
      bevelSegments:  6,
    });
    geo.computeBoundingBox();
    const cx = (geo.boundingBox.max.x + geo.boundingBox.min.x) / 2;
    const cy = (geo.boundingBox.max.y + geo.boundingBox.min.y) / 2;
    geo.translate(-cx, -cy, 0);

    textGroup.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      color:             0xffffff,
      emissive:          0x220033,
      emissiveIntensity: 0.45,
      metalness:         0.95,
      roughness:         0.07,
    })));
  }
);

// ── Link Boxes ────────────────────────────────────────────────────────────────

const metalFace = () => new THREE.MeshStandardMaterial({
  color:     0x8899bb,
  metalness: 0.97,
  roughness: 0.13,
});

const BOX_Y = -1.80;
const BOX_R = 0.22; // corner radius (matches RoundedBoxGeometry)

// Alpha mask so the logo plane clips to the same rounded outline as the box
const cornerMask = (() => {
  const sz = 256, r = sz * (BOX_R / 1.45);
  const cv = document.createElement('canvas');
  cv.width = cv.height = sz;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, sz, sz);
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(sz - r, 0);
  ctx.arcTo(sz, 0,  sz, r,      r);
  ctx.lineTo(sz, sz - r);
  ctx.arcTo(sz, sz, sz - r, sz, r);
  ctx.lineTo(r, sz);
  ctx.arcTo(0,  sz, 0, sz - r,  r);
  ctx.lineTo(0, r);
  ctx.arcTo(0,  0,  r, 0,       r);
  ctx.closePath();
  ctx.fill();
  return new THREE.CanvasTexture(cv);
})();

const BOX_DEFS = [
  { tex: appleMusicTex, url: 'https://music.apple.com/us/artist/bass-kittens/151840393', x: -2.45 },
  { tex: bandcampTex,   url: 'https://basskittens.bandcamp.com/',                        x:  0.0  },
  { tex: youtubeTex,    url: 'https://www.youtube.com/channel/UCMrlQ24ibmkLBJCLndsmyVg', x:  2.45 },
];

const linkBoxes = BOX_DEFS.map(({ tex, url, x }) => {
  const group = new THREE.Group();
  group.position.set(x, BOX_Y, 0.5);

  // Metallic rounded shell (all faces, single material)
  const shell = new THREE.Mesh(
    new RoundedBoxGeometry(1.45, 1.45, 0.28, 5, BOX_R),
    metalFace()
  );
  shell.layers.set(2);
  group.add(shell);

  // Logo face: flat plane just proud of the front face, corners clipped by alphaMap
  const face = new THREE.Mesh(
    new THREE.PlaneGeometry(1.45, 1.45),
    new THREE.MeshStandardMaterial({
      map: tex, alphaMap: cornerMask, alphaTest: 0.5,
      metalness: 0.1, roughness: 0.6,
    })
  );
  face.position.z = 0.142; // sits just in front of box face (depth/2 = 0.14)
  face.layers.set(2);
  group.add(face);

  scene.add(group);
  return { group, shell, face, url };
});

const raycaster = new THREE.Raycaster();
raycaster.layers.enable(2);
const mouse2d   = new THREE.Vector2();
const boxMeshes = linkBoxes.flatMap(b => [b.shell, b.face]);

renderer.domElement.addEventListener('click', e => {
  mouse2d.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouse2d, camera);
  const hit = raycaster.intersectObjects(boxMeshes)[0];
  if (hit) window.open(linkBoxes.find(b => b.shell === hit.object || b.face === hit.object).url, '_blank');
});

renderer.domElement.addEventListener('mousemove', e => {
  mouse2d.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouse2d, camera);
  renderer.domElement.style.cursor =
    raycaster.intersectObjects(boxMeshes).length ? 'pointer' : 'default';
});

// ── Animate ───────────────────────────────────────────────────────────────────
const posAttr = cloudGeo.getAttribute('position');
const LPArr   = cloudMat.uniforms.uLP.value;
const LIArr   = cloudMat.uniforms.uLI.value;

let t = 0;

(function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Strobe lights — orbit + pulse
  lights.forEach((l, i) => {
    const a      = l.phase + t * l.speed;
    const strobe = Math.pow(Math.max(0, Math.sin(t * l.strobeHz)), 2.0);
    l.pl.position.set(
      Math.cos(a)        * l.radius,
      Math.sin(a * 0.65) * l.yAmp + l.yOff,
      Math.sin(a * 0.35) * l.zA + 1.5,
    );
    l.pl.intensity = strobe * 5.5;
    LIArr[i]       = strobe * 3.2;
    LPArr[i].copy(l.pl.position);
  });

  // Advance particles toward camera
  for (let i = 0; i < N; i++) {
    posAttr.array[i*3+2] += 0.055;
    if (posAttr.array[i*3+2] > 8.5) spawnCloud(i, false);
  }
  posAttr.needsUpdate = true;

  // Subtle camera drift
  camera.position.x = Math.sin(t * 0.13) * 0.28;
  camera.position.y = Math.sin(t * 0.09) * 0.20;
  camera.lookAt(0, 0, 0);

  // Text slow rock
  textGroup.rotation.y = Math.sin(t * 0.21) * 0.08;

  // Box float + gleam rotation
  linkBoxes.forEach((b, i) => {
    b.group.rotation.y = Math.sin(t * 0.38 + i * 1.3) * 0.12;
    b.group.rotation.x = Math.sin(t * 0.27 + i * 0.9) * 0.05;
    b.group.position.y = BOX_Y + Math.sin(t * 0.55 + i * 1.1) * 0.06;
  });

  composer.render();
})();

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.resolution.set(innerWidth, innerHeight);
});
</script>
</body>
</html>
